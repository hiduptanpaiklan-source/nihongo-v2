<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NIHONGO — Latihan Kompetensi Bahasa Jepang</title>
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="Latihan kompetensi bahasa Jepang interaktif yang mencakup kosakata, angka, nama bulan, nama hari, ungkapan, tata bahasa, dan hiragana.">
  <style>
@import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@500;700;800;900&display=swap");

    :root{
      --bg:#f8fafc; --card:#ffffff; --ink:#172033; --muted:#64748b;
      --primary:#7c3aed; --primary2:#06b6d4; --pink:#f472b6;
      --good:#16a34a; --bad:#dc2626; --warn:#f59e0b;
      --line:#e2e8f0; --shadow:0 18px 50px rgba(30,41,59,.12);
      --radius:26px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:"Nunito",Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);background:
        radial-gradient(circle at top left,rgba(124,58,237,.18),transparent 28rem),
        radial-gradient(circle at top right,rgba(6,182,212,.16),transparent 24rem),
        linear-gradient(180deg,#fff,#f8fafc 42%,#eef2ff);
      min-height:100vh;
    }
    button,input,select{font:inherit}
    .wrap{max-width:1180px;margin:auto;padding:22px}
    .hero{
      position:relative;overflow:hidden;border-radius:34px;padding:28px;
      background:linear-gradient(135deg,#3b0764,#7c3aed 45%,#06b6d4);
      color:white;box-shadow:var(--shadow);
    }
    .hero:before{
      content:"";position:absolute;inset:-2px;background:
      radial-gradient(circle at 20% 20%,rgba(255,255,255,.32),transparent 9rem),
      radial-gradient(circle at 75% 35%,rgba(255,255,255,.20),transparent 11rem);
      pointer-events:none;
    }
    .heroGrid{position:relative;display:grid;grid-template-columns:1.2fr .8fr;gap:24px;align-items:center}
    .kicker{
      display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.25);padding:8px 12px;border-radius:999px;
      font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:12px;
    }
    h1{font-size:clamp(34px,6vw,70px);line-height:.95;margin:16px 0 12px}
    .hero p{font-size:18px;line-height:1.65;max-width:680px;color:rgba(255,255,255,.9)}
    .badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .badge{
      background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.25);
      border-radius:999px;padding:9px 13px;font-weight:800;
    }
    .mascotStage{
      min-height:310px;display:grid;place-items:center;position:relative;
    }
    .mascotBlob{
      width:min(320px,86vw);aspect-ratio:1;border-radius:38% 62% 48% 52%/55% 43% 57% 45%;
      background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
      display:grid;place-items:center;box-shadow:inset 0 0 50px rgba(255,255,255,.16);
      animation:float 4s ease-in-out infinite;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .mascotBlob img{max-width:88%;max-height:88%;object-fit:contain;filter:drop-shadow(0 18px 18px rgba(15,23,42,.28))}
    .speech{
      position:absolute;right:8px;bottom:8px;background:#fff;color:#312e81;border-radius:20px;
      padding:12px 14px;width:min(260px,80vw);box-shadow:0 15px 35px rgba(15,23,42,.2);
      font-weight:800;
    }
    .topbar{
      display:flex;gap:12px;justify-content:space-between;align-items:center;margin:20px 0;
      flex-wrap:wrap;
    }
    .tabs,.actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:0;border-radius:16px;padding:12px 15px;font-weight:900;cursor:pointer;
      background:#fff;color:var(--ink);box-shadow:0 8px 20px rgba(15,23,42,.08);
      border:1px solid var(--line);transition:.18s transform,.18s filter,.18s background;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}
    .btn.ghost{background:#fff}
    .btn.danger{background:#fff1f2;color:#be123c;border-color:#fecdd3}
    .btn.active{background:#312e81;color:#fff}
    .layout{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
    .card,.panel{
      background:rgba(255,255,255,.88);backdrop-filter:blur(14px);
      border:1px solid rgba(226,232,240,.85);border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .panel{padding:18px;position:sticky;top:16px}
    .card{padding:22px}
    .track{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden}
    .fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--primary),var(--primary2));border-radius:999px}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
    .stat{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:12px}
    .stat span{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}
    .stat b{font-size:22px}
    .miniMascot{
      display:flex;gap:12px;align-items:center;background:#faf5ff;border:1px solid #eadcff;
      padding:12px;border-radius:20px;margin-top:14px;
    }
    .miniMascot img{width:76px;height:76px;object-fit:contain;border-radius:18px;background:#fff}
    .questionHead{display:flex;justify-content:space-between;gap:14px;align-items:start;flex-wrap:wrap}
    .topic{display:inline-flex;background:#eef2ff;color:#3730a3;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px}
    .qText{font-size:23px;line-height:1.45;margin:15px 0 18px;font-weight:900}
    .choices{display:grid;gap:12px}
    .choice{
      display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:2px solid var(--line);
      background:#fff;border-radius:18px;padding:14px;cursor:pointer;font-weight:850;color:var(--ink);
    }
    .choice:hover{border-color:#c4b5fd;background:#faf5ff}
    .choice.selected{border-color:var(--primary);background:#f5f3ff}
    .choice.correct{border-color:rgba(22,163,74,.55);background:#ecfdf5}
    .choice.wrong{border-color:rgba(220,38,38,.55);background:#fff1f2}
    .letter{
      width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
      background:#eef2ff;color:#3730a3;font-weight:1000;flex:0 0 auto;
    }
    .explain{
      margin-top:16px;border-left:5px solid var(--primary);background:#f8fafc;
      border-radius:18px;padding:15px;line-height:1.65;
    }
    .jumpGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
    .jump{
      aspect-ratio:1;border-radius:14px;border:1px solid var(--line);background:#fff;font-weight:900;cursor:pointer;
    }
    .jump.done{background:#dcfce7;border-color:#86efac}
    .jump.current{background:#312e81;color:#fff}
    .select{width:100%;border-radius:14px;border:1px solid var(--line);padding:11px;background:#fff;font-weight:800}
    .sectionTitle{font-size:32px;margin:0 0 8px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .note{
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:18px;
      padding:14px;line-height:1.6;font-weight:750;
    }
    details{
      background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;
    }
    summary{cursor:pointer;font-weight:950}
    table{width:100%;border-collapse:collapse;margin:10px 0;background:#fff;border-radius:14px;overflow:hidden}
    th,td{border:1px solid var(--line);padding:10px;text-align:left}
    th{background:#eef2ff}
    .historyItem{border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:#fff}
    .footer{text-align:center;color:var(--muted);padding:24px}
    @media(max-width:880px){
      .heroGrid,.layout,.grid2{grid-template-columns:1fr}
      .panel{position:static}
      .speech{position:static;margin-top:12px}
    }
  


/* App shell mengikuti mockup konsep */
.wrap{max-width:1380px;margin:auto;padding:0 22px 22px}
.appShell{max-width:1380px;margin:0 auto;padding:0 18px 24px}
.appHeader{
  min-height:108px;border-radius:0 0 34px 34px;padding:20px 26px;
  background:linear-gradient(110deg,#7c3aed 0%,#4f7df3 52%,#06b6d4 100%);
  color:#fff;display:grid;grid-template-columns:330px 1fr 180px;gap:20px;align-items:center;
  box-shadow:0 18px 50px rgba(30,41,59,.14);position:relative;overflow:visible;
}
.appHeader:before{
  content:"";position:absolute;inset:0;background:
  radial-gradient(circle at 18% 22%,rgba(255,255,255,.22),transparent 12rem),
  radial-gradient(circle at 76% 20%,rgba(255,255,255,.16),transparent 14rem);
  pointer-events:none;
}
.brand,.appNav,.userCluster{position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:14px}
.brandIcon{font-size:46px;line-height:1;filter:drop-shadow(0 6px 10px rgba(15,23,42,.16))}
.brandName{font-size:36px;line-height:1;font-weight:1000;letter-spacing:.02em}
.brandSub{font-size:14px;margin-top:6px;color:rgba(255,255,255,.9);font-weight:800}
.appNav{display:flex;gap:10px;justify-content:center;align-items:end;height:100%;flex-wrap:wrap}
.navBtn{
  border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:18px;padding:14px 16px;
  font-weight:950;display:inline-flex;gap:8px;align-items:center;cursor:pointer;
  transition:.18s transform,.18s background,.18s color;min-height:52px;
}
.navBtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.16)}
.navBtn.active{
  background:#fff;color:#5b21b6;box-shadow:0 14px 28px rgba(30,41,59,.16);
  border:1px solid rgba(255,255,255,.55);
}
.navIcon{font-size:20px;line-height:1}
.userCluster{display:flex;align-items:center;justify-content:flex-end;gap:12px}
.levelBadge{
  display:inline-flex;gap:6px;align-items:center;border:1px solid rgba(255,255,255,.55);
  background:rgba(255,255,255,.12);border-radius:999px;padding:8px 12px;font-weight:950;
}
.profileDot{
  width:42px;height:42px;border-radius:999px;background:#fff;color:#0284c7;display:grid;place-items:center;
  font-size:23px;box-shadow:0 10px 22px rgba(15,23,42,.15)
}
.appContent{
  margin-top:-2px;border-radius:32px;padding:46px 26px 18px;background:
  radial-gradient(circle at 0% 18%,rgba(244,114,182,.13),transparent 12rem),
  radial-gradient(circle at 95% 88%,rgba(6,182,212,.10),transparent 18rem),
  linear-gradient(180deg,rgba(255,255,255,.78),rgba(248,250,252,.92));
  border:1px solid rgba(226,232,240,.8);box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
}
.utilityActions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin:-22px 0 18px}

/* Cocokkan Kata — layout presisi sesuai mockup */
.silangLayout{
  display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:24px;align-items:stretch;
}
.matchMain{
  min-height:690px;padding:30px 34px;border-radius:28px;display:flex;flex-direction:column;
}
.packageBar{
  display:flex;gap:10px;overflow:auto;padding:8px 2px 12px;margin:14px 0 10px;
  scrollbar-width:thin;
}
.packageBtn{
  white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:16px;padding:10px 12px;
  cursor:pointer;font-weight:950;color:var(--ink);box-shadow:0 8px 18px rgba(15,23,42,.06)
}
.packageBtn.active{background:#312e81;color:#fff;border-color:#312e81}
.matchIntro{display:flex;gap:18px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.matchIcon{
  width:70px;height:70px;border-radius:20px;background:#f5f3ff;color:var(--primary);
  display:grid;place-items:center;font-size:34px;border:1px solid #ede9fe;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7)
}
.matchTitle h2{font-size:34px;margin:0 0 6px;letter-spacing:-.02em}
.matchTitle p{margin:0;color:#334155;font-weight:750;line-height:1.55}
.matchMeta{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.matchMeta .topic{font-size:12px}
.matchBoard{
  --leftCol:minmax(260px,.88fr);
  --lineCol:clamp(170px,18vw,250px);
  --rightCol:minmax(210px,.62fr);
  display:grid;grid-template-columns:var(--leftCol) var(--lineCol) var(--rightCol);
  align-items:start;margin-top:22px;position:relative;
}
.matchHead.leftHead,
.matchCol.left .matchItem{width:min(100%,560px);justify-self:start}
.matchHead.rightHead,
.matchCol.right .matchItem{width:min(100%,430px);justify-self:end}
.matchHead{
  text-align:center;border-radius:15px;padding:12px 14px;font-weight:1000;
  background:#f5f3ff;color:#6d28d9;box-shadow:inset 0 0 0 1px rgba(255,255,255,.72);
}
.matchHead.leftHead{grid-column:1}
.matchHead.rightHead{grid-column:3;background:#f5f3ff;color:#6d28d9}
.matchPlay{
  grid-column:1 / 4;display:grid;grid-template-columns:var(--leftCol) var(--lineCol) var(--rightCol);
  align-items:start;margin-top:18px;position:relative;
}
.matchCol{display:grid;gap:var(--matchGap,16px);position:relative;z-index:2}
.matchCol.left{grid-column:1}
.matchCol.right{grid-column:3}
.matchItem{
  height:var(--rowH,84px);border-radius:18px;background:#fff;border:2px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:14px 16px;font-weight:950;cursor:pointer;
  box-shadow:0 10px 22px rgba(15,23,42,.07);position:relative;
  transition:.16s transform,.16s border-color,.16s background,.16s box-shadow;
  width:100%;text-align:left;color:#0f172a;font-size:17px;
}
.matchItem:hover{transform:translateY(-1px);border-color:#c4b5fd;background:#faf5ff}
.matchItem.selected{border-color:#7c3aed;background:#f5f3ff;box-shadow:0 12px 28px rgba(124,58,237,.14)}
.matchItem.correct{border-color:rgba(22,163,74,.55);background:#ecfdf5}
.matchItem.wrong{border-color:rgba(220,38,38,.55);background:#fff1f2}
.matchNum{
  width:42px;height:42px;border-radius:15px;display:grid;place-items:center;flex:0 0 auto;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-weight:1000;font-size:20px;
}
.matchCol.right .matchNum{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
.matchText{line-height:1.35;overflow-wrap:anywhere}
.matchDot{
  position:absolute;right:-11px;width:18px;height:18px;border-radius:999px;background:var(--dot,#7c3aed);
  box-shadow:0 0 0 5px rgba(255,255,255,.96),0 5px 12px rgba(15,23,42,.15);z-index:2;
}
.matchCol.right .matchDot{left:-11px;right:auto}
.matchLines{
  grid-column:2;grid-row:1;position:relative;inset:auto;width:100%;height:var(--lineH,100%);
  overflow:visible;pointer-events:none;z-index:1;align-self:start;
}
.matchLines path{
  fill:none;stroke-width:4;stroke-linecap:round;
  filter:drop-shadow(0 3px 3px rgba(15,23,42,.13));
}
.matchLines path.wrong{stroke-dasharray:7 7;opacity:.55}

.matchPanel{
  position:static;display:flex;flex-direction:column;gap:16px;height:100%;border-radius:28px;padding:26px;
}
.scoreBox{
  min-height:118px;border-radius:20px;padding:18px;background:#f5f3ff;border:1px solid #ede9fe;
  display:flex;align-items:center;gap:16px;width:100%;
}
.scoreBox.good{background:#ecfdf5;border-color:#ccfbf1}
.scoreIcon{
  width:66px;height:66px;border-radius:24px;display:grid;place-items:center;background:rgba(255,255,255,.72);
  font-size:32px;flex:0 0 auto;
}
.scoreBox span{display:block;font-weight:950;color:#5b21b6}
.scoreBox.good span{color:#059669}
.scoreBox b{font-size:42px;line-height:1;color:#6d28d9}
.scoreBox.good b{color:#059669}
.matchActions{display:grid;gap:10px}
.matchCheckBtn{
  border:0;border-radius:17px;padding:16px 18px;font-weight:1000;cursor:pointer;
  background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;font-size:17px;
  box-shadow:0 12px 24px rgba(109,40,217,.22)
}
.matchSmallActions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.matchSmallActions .btn{padding:10px 12px;border-radius:14px}
.matchDivider{border-top:2px dashed #e2e8f0;margin:4px 0 0}
.matchLower{
  margin-top:auto;display:grid;justify-items:center;gap:8px;padding-top:8px;
}
.matchSpeech{
  width:min(220px,100%);background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 16px;
  line-height:1.55;font-weight:850;box-shadow:0 10px 22px rgba(15,23,42,.08);position:relative;
  justify-self:center;
}
.matchSpeech:after{
  content:"";position:absolute;left:45px;bottom:-13px;border-width:14px 12px 0 0;
  border-style:solid;border-color:#fff transparent transparent transparent;
}
.matchMascot{
  display:grid;place-items:center;width:100%;min-height:200px;padding:2px 10px 8px;
}
.matchMascot img{
  max-width:205px;max-height:205px;object-fit:contain;filter:drop-shadow(0 14px 18px rgba(15,23,42,.14));
  transform:translateX(-3px);
}
.matchHint{font-size:13px;color:var(--muted);line-height:1.55;font-weight:750;margin:16px 0 0}

@media(max-width:1120px){
  .appHeader{grid-template-columns:1fr;gap:14px}
  .appNav{justify-content:flex-start}
  .userCluster{justify-content:flex-start}
  .silangLayout{grid-template-columns:1fr}
  .matchPanel{min-height:auto}
}
@media(max-width:880px){
  .appShell{padding:0 12px 18px}
  .appHeader{border-radius:0 0 26px 26px;padding:18px}
  .brandName{font-size:30px}
  .appContent{padding:28px 14px 16px}
  .matchMain{padding:22px 18px;min-height:auto}
  .matchBoard{display:block}
  .matchHead{margin-bottom:12px}
  .matchHead.rightHead{margin-top:18px}
  .matchPlay{display:block;margin-top:0}
  .matchCol{gap:10px}
  .matchLines{display:none}
  .matchDot{display:none}
  .matchCol.right{margin-top:10px}
  .matchItem{height:auto;min-height:70px}
}


/* Responsive optimization — laptop, tablet/iPad, Android, iPhone */
:root{
  --touch:44px;
}

@media (min-width:1200px) and (max-height:820px){
  .appHeader{min-height:92px;padding:16px 24px}
  .appContent{padding-top:30px}
  .matchMain{min-height:560px;padding:24px 28px}
  .matchTitle h2{font-size:30px}
  .matchIcon{width:58px;height:58px;font-size:28px}
  .packageBar{margin:8px 0 6px;padding-bottom:8px}
  .matchBoard{margin-top:14px}
  .matchPlay{margin-top:14px}
  .scoreBox{min-height:92px;padding:14px}
  .scoreIcon{width:52px;height:52px;border-radius:18px;font-size:26px}
  .scoreBox b{font-size:34px}
  .matchMascot{min-height:148px}
  .matchMascot img{max-width:158px;max-height:158px}
  .matchSpeech{font-size:14px;padding:10px 13px}
}

@media (min-width:1121px) and (max-width:1366px){
  .appShell,.wrap{max-width:1240px}
  .appHeader{grid-template-columns:270px 1fr 140px;gap:12px}
  .brandName{font-size:32px}
  .brandIcon{font-size:38px}
  .appNav{gap:7px}
  .navBtn{padding:12px 12px;min-height:48px}
  .silangLayout{grid-template-columns:minmax(0,1fr) 292px;gap:18px}
  .matchMain{padding:26px 28px}
  .matchBoard{
    --leftCol:minmax(240px,.86fr);
    --lineCol:clamp(150px,16vw,210px);
    --rightCol:minmax(200px,.6fr);
  }
  .matchHead.leftHead,
  .matchCol.left .matchItem{width:min(100%,500px)}
  .matchHead.rightHead,
  .matchCol.right .matchItem{width:min(100%,390px)}
  .matchItem{font-size:16px;padding:12px 14px}
  .matchPanel{padding:22px}
}

/* iPad/tablet landscape and portrait: keep the matching board visual, move score panel below */
@media (min-width:700px) and (max-width:1120px){
  .appShell{padding:0 18px 22px}
  .appHeader{
    grid-template-columns:1fr;
    gap:14px;
    min-height:auto;
    padding:18px 22px;
  }
  .brandName{font-size:32px}
  .brandSub{font-size:13px}
  .appNav{
    justify-content:flex-start;
    overflow-x:auto;
    flex-wrap:nowrap;
    padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
  }
  .navBtn{flex:0 0 auto;min-height:var(--touch);padding:11px 13px}
  .userCluster{justify-content:flex-start}
  .appContent{padding:30px 18px 16px}
  .silangLayout{grid-template-columns:1fr;gap:18px}
  .matchMain{min-height:auto;padding:24px;border-radius:26px}
  .matchIntro{gap:14px}
  .matchIcon{width:58px;height:58px;font-size:29px}
  .matchTitle h2{font-size:28px}
  .packageBar{
    padding-bottom:10px;
    margin:10px 0 8px;
    -webkit-overflow-scrolling:touch;
  }
  .packageBtn{padding:10px 12px;min-height:var(--touch)}
  .matchBoard{

  position:absolute !important;
  inset:0 !important;
  width:100% !important;
  height:100% !important;
  overflow:visible !important;
  pointer-events:none !important;
  z-index:1 !important;
}
.matchLines path{
  fill:none;
  stroke-width:4;
  stroke-linecap:round;

  filter:drop-shadow(0 3px 3px rgba(15,23,42,.13));
}
.matchLines path.wrong{
  stroke-dasharray:7 7;

}
.matchLines path:not(.wrong){
  stroke-dasharray:none !important;

}

  grid-row:auto !important;
  grid-area:auto !important;
  align-self:auto !important;
  justify-self:auto !important;
  overflow:visible !important;
  pointer-events:none !important;
  display:block !important;
  z-index:1 !important;
}
.matchCol{

}
.matchLines path{

const STORE = "nihongo_latihan_kompetensi_v15";
const STUDENT_STORE = "nihongo_student_identity_v1";

/*
  Tempel URL deployment Google Apps Script di bawah ini.
  Contoh: https://script.google.com/macros/s/AKfycb.../exec
*/
const SUBMISSION_ENDPOINT = "https://script.google.com/macros/s/AKfycbzxqkGSdjwuEJ1lTAV1ih9JuykmvDHB6SX8gF29-EUdF7JhXqYMGo2_duY4gx86COWR/exec";

let studentIdentity = readStoredJSON(STUDENT_STORE, null);
let syncStatusTimer = null;

function endpointIsReady(){
  return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/i
    .test(SUBMISSION_ENDPOINT.trim());
}

function showSyncStatus(message,type=""){
  const status = document.getElementById("syncStatus");
  if(!status) return;

  clearTimeout(syncStatusTimer);
  status.textContent = message;
  status.className = `syncStatus show ${type}`.trim();
  syncStatusTimer = setTimeout(()=>{
    status.classList.remove("show");
  },5000);
}

function ensureStudentLogin(force=false){
  const modal = document.getElementById("studentLogin");
  const username = document.getElementById("studentUsername");
  const email = document.getElementById("studentEmail");
  const error = document.getElementById("studentLoginError");

  if(!modal) return;

  if(error) error.textContent = "";
  if(username) username.value = studentIdentity?.username || "";
  if(email) email.value = studentIdentity?.email || "";

  modal.hidden = Boolean(studentIdentity) && !force;
  document.body.style.overflow = modal.hidden ? "" : "hidden";

  if(!modal.hidden){
    setTimeout(()=>username?.focus(),0);
  }
}

function saveStudentLogin(event){
  event.preventDefault();

  const usernameInput = document.getElementById("studentUsername");
  const emailInput = document.getElementById("studentEmail");
  const error = document.getElementById("studentLoginError");
  const username = usernameInput?.value.trim() || "";
  const email = emailInput?.value.trim().toLowerCase() || "";

  if(username.length < 2){
    if(error) error.textContent = "Username atau nama siswa minimal 2 karakter.";
    usernameInput?.focus();
    return;
  }

  if(!emailInput?.checkValidity()){
    if(error) error.textContent = "Masukkan alamat email yang valid.";
    emailInput?.focus();
    return;
  }

  studentIdentity = {username,email};
  localStorage.setItem(STUDENT_STORE,JSON.stringify(studentIdentity));
  ensureStudentLogin();
  render();

  if(!endpointIsReady()){
    showSyncStatus(
      "Website belum dihubungkan ke Google Sheets. Ikuti PANDUAN-PEMASANGAN.html.",
      "error"
    );
  }
}

function changeStudent(){
  if(!confirm("Ganti identitas siswa pada perangkat ini?")) return;
  ensureStudentLogin(true);
}

function submitStudentResult(activity,data){
  if(!studentIdentity){
    ensureStudentLogin(true);
    return;
  }

  if(!endpointIsReady()){
    showSyncStatus(
      "Hasil tersimpan di perangkat, tetapi belum dikirim karena URL Google Sheets belum dipasang.",
      "error"
    );
    return;
  }

  const payload = {
    submittedAt:new Date().toISOString(),
    username:studentIdentity.username,
    email:studentIdentity.email,
    activity,
    ...data,
    totalXP:Math.max(0,Number(state.xp?.total) || 0)
  };

  showSyncStatus("Mengirim hasil kepada guru…");

  fetch(SUBMISSION_ENDPOINT,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload),
    keepalive:true
  })
    .then(()=>{
      showSyncStatus("Hasil berhasil dikirim kepada guru.","success");
    })
    .catch(()=>{
      showSyncStatus(
        "Hasil belum terkirim. Periksa internet, lalu tekan Periksa Jawaban lagi.",
        "error"
      );
    });
}

function cancelAutoAdvance(){

    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;

function normalizeXPProgress(value){
  const source = value && typeof value === "object" ? value : {};
  return {
    total:Math.max(0,Number(source.total) || 0),
    streak:Math.max(0,Number(source.streak) || 0),
    bestStreak:Math.max(0,Number(source.bestStreak) || 0),
    awarded:source.awarded && typeof source.awarded === "object"
      ? source.awarded
      : {},
    events:Array.isArray(source.events) ? source.events.slice(0,80) : []
  };
}

function persistXPProgress(){
  localStorage.setItem(
    XP_STORE,
    JSON.stringify({
      total:state.xp.total,
      streak:state.xp.streak,
      bestStreak:state.xp.bestStreak,
      awarded:state.xp.awarded,
      events:state.xp.events.slice(0,80)
    })
  );
}

function awardXP(entries){
  const list = (Array.isArray(entries) ? entries : [entries])
    .filter(Boolean);

  let amount = 0;
  let answered = 0;
  let correct = 0;
  let streakBonuses = 0;

  list.forEach(entry=>{
    const key = String(entry.key || "");

    if(!key || state.xp.awarded[key]){
      return;
    }

    const isCorrect = Boolean(entry.correct);
    const baseXP = 1;
    const correctBonus = isCorrect ? 1 : 0;

    if(isCorrect){
      state.xp.streak += 1;
    }else{
      state.xp.streak = 0;
    }

    const streakBonus = isCorrect && state.xp.streak >= 2 ? 1 : 0;
    const gained = baseXP + correctBonus + streakBonus;

    state.xp.total += gained;
    state.xp.bestStreak = Math.max(
      state.xp.bestStreak,
      state.xp.streak
    );

    state.xp.awarded[key] = {
      correct:isCorrect,
      xp:gained,
      at:Date.now()
    };

    state.xp.events.unshift({
      key,
      label:String(entry.label || "Jawaban"),
      correct:isCorrect,
      xp:gained,
      streak:state.xp.streak,
      at:Date.now()
    });

    amount += gained;
    answered += 1;

    if(isCorrect){
      correct += 1;
      streakBonuses += streakBonus;
    }
  });

  if(!answered){
    return null;
  }

  state.xp.events = state.xp.events.slice(0,80);

  persistXPProgress();
  return {
    amount,
    answered,
    correct,
    streakBonuses,
    streak:state.xp.streak
  };
}

function awardFixedXP(entries){
  const list = (Array.isArray(entries) ? entries : [entries])
    .filter(Boolean);

  let amount = 0;
  let awarded = 0;

  list.forEach(entry=>{
    const key = String(entry.key || "");
    const gained = Math.max(0,Number(entry.xp) || 0);

    if(!key || !gained || state.xp.awarded[key]){
      return;
    }

    state.xp.total += gained;
    state.xp.awarded[key] = {
      correct:Boolean(entry.correct),
      xp:gained,
      at:Date.now()
    };

    state.xp.events.unshift({
      key,
      label:String(entry.label || "Jawaban"),
      correct:Boolean(entry.correct),
      xp:gained,
      streak:state.xp.streak,
      at:Date.now()
    });

    amount += gained;
    awarded += 1;
  });

  if(!awarded){
    return {
      amount:0,
      awarded:0
    };
  }

  state.xp.events = state.xp.events.slice(0,80);
  persistXPProgress();

  return {
    amount,
    awarded
  };
}

function essayXPForScore(score){
  const normalizedScore = Math.max(
    0,
    Math.min(100,Number(score) || 0)
  );

  return 10 + Math.round(normalizedScore / 10);
}

function isEssayXPKey(key){
  return String(key || "").startsWith("uraian:");
}

function essayXPStatus(){
  const items = [];
  let targetXP = 0;

  essays.forEach((essay,index)=>{
    const answer = String(state.essayAnswers[index] || "").trim();
    const grade = state.essayGrades[index];

    if(!answer || !grade){
      return;
    }

    const score = Math.max(
      0,
      Math.min(100,Number(grade.score) || 0)
    );
    const xp = essayXPForScore(score);

    items.push({
      index,
      title:essay.title,
      score,
      xp
    });

    targetXP += xp;
  });

  return {
    items,
    answered:items.length,
    targetXP,
    maximum:essays.length * 20
  };
}

function syncEssayXP(){
  const status = essayXPStatus();
  let previous = 0;

  Object.keys(state.xp.awarded).forEach(key=>{
    if(!isEssayXPKey(key)){
      return;
    }

    previous += Math.max(
      0,
      Number(state.xp.awarded[key]?.xp) || 0
    );

    delete state.xp.awarded[key];
  });

  state.xp.events = state.xp.events.filter(
    event => !isEssayXPKey(event?.key)
  );

  state.xp.total = Math.max(
    0,
    state.xp.total - previous + status.targetXP
  );

  status.items.forEach(item=>{
    const key = `uraian:v5:${item.index}`;

    state.xp.awarded[key] = {
      correct:item.score === 100,
      xp:item.xp,
      at:Date.now()
    };

    state.xp.events.unshift({
      key,
      label:`Uraian ${item.title}`,
      correct:item.score === 100,
      xp:item.xp,
      streak:state.xp.streak,
      at:Date.now()
    });
  });

  state.xp.events = state.xp.events.slice(0,80);
  persistXPProgress();

  return {
    ...status,
    previous,
    difference:status.targetXP - previous
  };
}

function matchXPEntries(quiz,map){
  const entries = [];
  let answered = 0;
  let correct = 0;

  quiz.pairs.forEach((pair,leftIndex)=>{
    if(!Object.prototype.hasOwnProperty.call(map,leftIndex)){
      return;
    }

    answered += 1;
    const selected = map[leftIndex];
    const isCorrect = selected === pair.match;

    entries.push({
      key:`cocokkan:v2:${quiz.id}:${leftIndex}:terjawab`,
      xp:1,
      correct:false,
      label:`${quiz.title} — pasangan ${leftIndex + 1} dijawab`
    });

    if(isCorrect){
      correct += 1;
      entries.push({
        key:`cocokkan:v2:${quiz.id}:${leftIndex}:benar`,
        xp:1,
        correct:true,
        label:`${quiz.title} — pasangan ${leftIndex + 1} benar`
      });
    }
  });

  const allCorrect = (
    answered === quiz.pairs.length
    && correct === quiz.pairs.length
  );

  if(allCorrect){
    entries.push({
      key:`cocokkan:v2:${quiz.id}:bonus-semua-benar`,
      xp:5,
      correct:true,
      label:`${quiz.title} — bonus semua benar`
    });
  }

  return {
    entries,
    answered,
    correct,
    total:quiz.pairs.length,
    allCorrect
  };
}

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function cleanEssayAnswer(answer){
  return String(answer || "")
    .replace(/^Contoh jawaban:\s*/i, "")
    .replace(/^Contoh:\s*/i, "");
}

function normalizeGradeText(value){
  return String(value || "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/[.,;:!?！？。、，；：…()[\]{}"'“”‘’=+/_\\|—–-]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function compactGradeText(value){
  return normalizeGradeText(value).replace(/\s+/g,"");
}

function levenshteinDistance(a,b){
  const x = String(a);
  const y = String(b);
  const rows = x.length + 1;
  const cols = y.length + 1;
  const dp = Array.from({length:rows},()=>Array(cols).fill(0));
  for(let i=0;i<rows;i++) dp[i][0] = i;
  for(let j=0;j<cols;j++) dp[0][j] = j;
  for(let i=1;i<rows;i++){
    for(let j=1;j<cols;j++){
      const cost = x[i-1] === y[j-1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + cost
      );
    }
  }
  return dp[x.length][y.length];
}

function stringSimilarity(a,b){
  const x = compactGradeText(a);
  const y = compactGradeText(b);
  if(!x || !y) return 0;
  const maxLen = Math.max(x.length,y.length);
  return maxLen ? 1 - (levenshteinDistance(x,y) / maxLen) : 1;
}

function approximateContains(answer, variant){
  const haystack = compactGradeText(answer);
  const needle = compactGradeText(variant);
  if(!haystack || !needle) return false;
  if(haystack.includes(needle)) return true;
  if(needle.length < 4 || haystack.length < Math.max(2, needle.length - 2)) return false;

  const minWindow = Math.max(2, needle.length - 2);
  const maxWindow = Math.min(haystack.length, needle.length + 2);
  for(let size=minWindow; size<=maxWindow; size++){
    for(let i=0; i<=haystack.length-size; i++){
      const window = haystack.slice(i,i+size);
      if(stringSimilarity(window,needle) >= 0.84) return true;
    }
  }
  return false;
}

function hasAnyVariant(answer, variants){
  return variants.some(variant => approximateContains(answer,variant));
}


function splitListEntries(answer){
  return String(answer || "")
    .normalize("NFKC")
    .split(/[\n,，;；、]+/)
    .map(entry => entry.trim())
    .filter(Boolean);
}

function listEntryCandidates(entry){
  const raw = String(entry || "").trim();
  const candidates = [raw];

  const labelParts = raw.split(/[=:：]/);
  if(labelParts.length > 1){
    candidates.push(labelParts[labelParts.length - 1].trim());
  }

  [...candidates].forEach(candidate=>{
    candidate.split("/").forEach(part=>candidates.push(part.trim()));
  });

  return [...new Set(candidates.filter(Boolean))];
}

function entryMatchesVariant(entry,variant){
  const expected = compactGradeText(variant);
  if(!expected) return false;

  return listEntryCandidates(entry).some(candidate=>{
    const actual = compactGradeText(candidate);
    if(!actual) return false;
    if(actual === expected) return true;
    return expected.length >= 4
      && Math.abs(actual.length - expected.length) <= 2
      && stringSimilarity(actual,expected) >= 0.84;
  });
}

function listConceptMatched(entries,variants){
  return entries.some(entry=>
    variants.some(variant=>entryMatchesVariant(entry,variant))
  );
}


function escapeRegExp(value){
  return String(value).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}

function splitTargetStatements(answer, targets){
  let prepared = String(answer || "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/[.!?！？。；;\n,，、]+/g," | ")
    .replace(/\s+/g," ")
    .trim();

  const variants = targets
    .flatMap(target => target.variants)
    .map(variant => normalizeGradeText(variant))
    .filter(Boolean)
    .sort((a,b)=>b.length-a.length);

  variants.forEach(variant=>{
    const pattern = new RegExp(escapeRegExp(variant),"gi");
    prepared = prepared.replace(pattern, match => ` | ${match}`);
  });

  return prepared
    .split("|")
    .map(part=>part.trim())
    .filter(Boolean);
}

function findTargetStatement(answer, target, allTargets){
  const statements = splitTargetStatements(answer, allTargets);
  return statements.find(statement => hasAnyVariant(statement,target.variants)) || "";
}

function gradeLabel(score){
  if(score >= 90) return "Sangat baik";
  if(score >= 75) return "Baik";
  if(score >= 60) return "Cukup";
  return "Perlu diperbaiki";
}

function evaluateEssay(index, rawAnswer){
  const answer = String(rawAnswer || "").trim();
  const rubric = essayRubrics[index];

  if(!answer){
    return {
      score:0,
      label:"Belum diperiksa",
      feedback:"Tuliskan jawaban terlebih dahulu.",
      missing:[]
    };
  }

  if(rubric.type === "hiraganaCount"){
    const chars = answer.match(/[\u3041-\u3096]/g) || [];
    const unique = [...new Set(chars)];
    const score = Math.min(100, Math.round((unique.length / rubric.min) * 100));
    return {
      score,
      label:gradeLabel(score),
      feedback: unique.length >= rubric.min
        ? `Jawaban memuat ${unique.length} huruf hiragana yang berbeda.`
        : `Jawaban memuat ${unique.length} huruf hiragana yang berbeda. Tambahkan ${rubric.min - unique.length} huruf lagi.`,
      missing:[]
    };
  }

  if(rubric.type === "concepts"){
    const matched = rubric.concepts.filter(item => hasAnyVariant(answer,item.variants));
    const missing = rubric.concepts.filter(item => !hasAnyVariant(answer,item.variants)).map(item=>item.name);
    const score = Math.round((matched.length / rubric.concepts.length) * 100);
    return {
      score,
      label:gradeLabel(score),
      feedback:`Jawaban memuat ${matched.length} dari ${rubric.concepts.length} bagian yang diminta.`,
      missing
    };
  }


  if(rubric.type === "listConcepts"){
    const entries = splitListEntries(answer);
    const matched = rubric.concepts.filter(item =>
      listConceptMatched(entries,item.variants)
    );
    const missing = rubric.concepts.filter(item =>
      !listConceptMatched(entries,item.variants)
    ).map(item=>item.name);
    const score = Math.round((matched.length / rubric.concepts.length) * 100);

    return {
      score,
      label:gradeLabel(score),
      feedback:`Jawaban memuat ${matched.length} dari ${rubric.concepts.length} bagian yang diminta.`,
      missing
    };
  }

  if(rubric.type === "targetSentences"){
    const results = rubric.targets.map(target=>{
      const statement = findTargetStatement(answer,target,rubric.targets);
      const targetPresent = Boolean(statement);
      const predicatePresent = targetPresent && hasAnyVariant(statement,rubric.predicates);
      return {target,statement,targetPresent,predicatePresent,complete:targetPresent && predicatePresent};
    });

    const complete = results.filter(item=>item.complete).length;
    const missing = results
      .filter(item=>!item.complete)
      .map(item=>item.targetPresent
        ? `kalimat ${item.target.name} belum memiliki predikat yang sesuai`
        : `${item.target.name} belum digunakan dalam kalimat`);

    const score = Math.round((complete / rubric.targets.length) * 100);
    return {
      score,
      label:gradeLabel(score),
      feedback:`${complete} dari ${rubric.targets.length} kalimat sudah lengkap.`,
      missing
    };
  }

  if(rubric.type === "weightedConcepts"){
    let score = 0;
    const missing = [];
    rubric.concepts.forEach(item=>{
      if(hasAnyVariant(answer,item.variants)){
        score += item.weight;
      }else{
        missing.push(item.name);
      }
    });
    return {
      score:Math.round(score),
      label:gradeLabel(score),
      feedback:`Bagian tanggal yang sudah benar: ${Math.round(score)}%.`,
      missing
    };
  }

  return {
    score:0,
    label:"Tidak tersedia",
    feedback:"Jawaban ini belum dapat diperiksa secara otomatis.",
    missing:[]
  };
}

function persistEssayProgress(){
  localStorage.setItem(ESSAY_STORE, JSON.stringify({
    answers:state.essayAnswers,
    modes:state.essayModes,
    grades:state.essayGrades
  }));
}

function essayModeFor(index){
  const rubric = essayRubrics[index];
  return state.essayModes[index] || rubric.modeOptions[0][0];
}

function essayPlaceholder(index){
  const rubric = essayRubrics[index];
  const mode = essayModeFor(index);

  if(
    rubric
    && rubric.placeholders
    && rubric.placeholders[mode]
  ){
    return rubric.placeholders[mode];
  }

  if(mode === "hiragana"){
    return "Tuliskan jawaban menggunakan hiragana…";
  }

  if(mode === "campuran"){
    return "Tuliskan jawaban menggunakan hiragana dan/atau romaji…";
  }

  return "Tuliskan jawaban menggunakan romaji…";
}

function saveEssayAnswer(index,value){
  state.essayAnswers[index] = value;
  delete state.essayGrades[index];
  persistEssayProgress();
  const result = document.getElementById(`essayGrade-${index}`);
  if(result) result.innerHTML = "";
}

function setEssayMode(index,value){
  state.essayModes[index] = value;
  persistEssayProgress();
  const textarea = document.getElementById(`essayInput-${index}`);
  if(textarea) textarea.placeholder = essayPlaceholder(index);
}

function clearEssayAnswer(index){
  state.essayAnswers[index] = "";

  syncEssayXP();
  persistEssayProgress();
  render();
}

function clearAllEssayAnswers(){
  if(!confirm("Hapus seluruh jawaban uraian dan hasil penilaiannya?")) return;
  state.essayAnswers = {};
  state.essayGrades = {};
  syncEssayXP();
  persistEssayProgress();
  render();
}

function gradeEssayAnswer(index){
  const textarea = document.getElementById(`essayInput-${index}`);
  const value = textarea ? textarea.value : (state.essayAnswers[index] || "");
  const grade = evaluateEssay(index,value);

  state.essayAnswers[index] = value;
  state.essayGrades[index] = grade;

  syncEssayXP();
  persistEssayProgress();
  render();

  submitStudentResult("Uraian per soal",{
    topic:essays[index]?.title || `Soal ${index + 1}`,
    score:Number(grade.score || 0),
    correct:grade.score === 100 ? 1 : 0,
    total:1,
    answers:[{
      number:index + 1,
      question:essays[index]?.q || "",
      mode:essayModeFor(index),
      answer:value,
      grade
    }]
  });
}

function gradeAllEssays(){
  essays.forEach((essay,index)=>{
    const textarea = document.getElementById(`essayInput-${index}`);
    const value = textarea ? textarea.value : (state.essayAnswers[index] || "");
    const grade = evaluateEssay(index,value);

    state.essayAnswers[index] = value;
    state.essayGrades[index] = grade;
  });

  syncEssayXP();
  persistEssayProgress();
  render();

  const summary = essaySummary();
  submitStudentResult("Uraian semua soal",{
    topic:"Uraian",
    score:summary.average,
    correct:Object.values(state.essayGrades)
      .filter(grade=>Number(grade?.score) === 100).length,
    total:essays.length,
    answers:essays.map((essay,index)=>({
      number:index + 1,
      question:essay.q,
      mode:essayModeFor(index),
      answer:state.essayAnswers[index] || "",
      grade:state.essayGrades[index] || null
    }))
  });
}

function essaySummary(){
  const grades = Object.values(state.essayGrades).filter(Boolean);
  if(!grades.length) return {count:0, average:0};
  return {
    count:grades.length,
    average:Math.round(grades.reduce((sum,item)=>sum+Number(item.score || 0),0)/grades.length)
  };
}

function renderEssayGrade(index){
  const grade = state.essayGrades[index];
  if(!grade) return "";
  const missing = grade.missing && grade.missing.length
    ? `<div class="essayMissing"><b>Perlu dilengkapi:</b> ${grade.missing.map(escapeHTML).join(", ")}.</div>`
    : `<div class="essayComplete">Jawaban sudah memuat bagian yang diminta.</div>`;
  const gradeClass = grade.score >= 75 ? "good" : grade.score >= 60 ? "medium" : "low";
  const essayXP = essayXPForScore(grade.score);

  return `
    <div class="essayGradeCard ${gradeClass}">
      <div class="essayGradeScore">${grade.score}<span>/100</span></div>
      <div>
        <b>${escapeHTML(grade.label)}</b>
        <p>${escapeHTML(grade.feedback)}</p>
        ${missing}
      </div>
      <div class="essayXPBadge" aria-label="${essayXP} poin XP">
        +${essayXP} XP
      </div>
    </div>`;
}

function closeEssayAnswer(event){
  const modal = document.getElementById("essayExampleModal");

  if(
    event
    && event.currentTarget === modal
    && event.target !== modal
  ){
    return;
  }

  if(!modal){
    return;
  }

  modal.classList.add("isHidden");
  document.body.classList.remove("essayModalOpen");

  if(lastEssayAnswerButton){
    lastEssayAnswerButton.focus();
  }

function stats(){
  const list = visibleQuestions();

    question => Object.prototype.hasOwnProperty.call(
      state.answers,
      question.id
    )
  ).length;

  const correct = list.filter(
    question => state.answers[question.id] === question.a
  ).length;

  const total = list.length;
  const score = total ? Math.round((correct / total) * 100) : 0;
  const remaining = Math.max(0,total-answered);

  return {
    answered,
    correct,
    score,
    total,
    remaining,
    bankTotal:questions.length,
    topicTotal:total
  };

function splitMaterialTerm(term){
  const value = String(term || "").trim();
  const separator = value.indexOf(" / ");

  if(separator === -1){
    return {
      japanese:value,
      romaji:""
    };
  }

  return {
    japanese:value.slice(0,separator).trim(),
    romaji:value.slice(separator + 3).trim()
  };
}

function materialQuizRows(quiz){
  if(!quiz || !Array.isArray(quiz.pairs)){
    return "";
  }

  const isHiragana = quiz.topic === "Hiragana";

  return quiz.pairs.map(pair=>{
    const term = splitMaterialTerm(pair.term);
    const leftContent = isHiragana
      ? `<span class="studyJapanese">${term.japanese}</span>`
      : `
        <span class="studyJapanese">${term.japanese}</span>
        ${term.romaji
          ? `<span class="studyRomaji">${term.romaji}</span>`
          : ""
        }`;

    const rightContent = isHiragana
      ? `<span class="studyReading">${pair.match}</span>`
      : pair.match;

    return `
      <div class="studyRow">
        <div class="studyJP">${leftContent}</div>
        <div class="studyMeaning">${rightContent}</div>
      </div>`;
  }).join("");
}

function matchBoardHTML(quiz, map){
  const n = quiz.pairs.length;
  const rowH = n > 6 ? 58 : (n > 4 ? 60 : 64);
  const gap = n > 6 ? 8 : (n > 4 ? 10 : 12);
  const boardH = n * rowH + Math.max(0, n - 1) * gap;

  return `
    <div class="matchBoard" style="--rowH:${rowH}px;--matchGap:${gap}px;--lineH:${boardH}px;">
      <div class="matchHead leftHead">${quiz.leftLabel || "Kosakata Jepang"}</div>
      <div class="matchHead rightHead">${quiz.rightLabel || "Arti"}</div>

      <div class="matchPlay">
        <svg class="matchLines" id="matchLines" aria-hidden="true"></svg>

        <div class="matchCol left">
          ${quiz.pairs.map((p,i)=>{
            const ans = map[i];
            const isSelected = state.matchSelectedLeft === i;
            const ok = state.matchChecked && ans === p.match;
            const wrong = state.matchChecked && ans && ans !== p.match;
            return `<button class="matchItem ${isSelected?"selected":""} ${ok?"correct":""} ${wrong?"wrong":""}" data-left-index="${i}" onclick="chooseLeft(${i})">
              <span class="matchNum">${i+1}</span>
              <span class="matchText">${p.term}</span>
              <span class="matchDot" style="--dot:${matchColors[i % matchColors.length]}"></span>
            </button>`;
          }).join("")}
        </div>

        <div class="matchCol right">
          ${quiz.right.map((r,i)=>{
            const selectedBy = Object.entries(map).find(([li, ans]) => ans === r);
            const leftIndex = selectedBy ? Number(selectedBy[0]) : -1;
            const isSelectedRight = state.matchSelectedRight === i;
            const ok = state.matchChecked && leftIndex >= 0 && quiz.pairs[leftIndex].match === r;
            const wrong = state.matchChecked && leftIndex >= 0 && quiz.pairs[leftIndex].match !== r;
            return `<button class="matchItem ${isSelectedRight?"selected":""} ${ok?"correct":""} ${wrong?"wrong":""}" data-right-index="${i}" onclick="chooseRightByIndex(${i})">
              <span class="matchDot" style="--dot:${leftIndex>=0 ? matchColors[leftIndex % matchColors.length] : '#94a3b8'}"></span>
              <span class="matchNum">${i+1}</span>
              <span class="matchText">${r}</span>
            </button>`;
          }).join("")}
        </div>
      </div>
    </div>`;
}

function dotCenterRelativeToPlay(dot, playRect){
  const r = dot.getBoundingClientRect();
  return {
    x: r.left + r.width / 2 - playRect.left,
    y: r.top + r.height / 2 - playRect.top
  };
}

function dotCenterRelativeToPlay(dot, playRect){
  const r = dot.getBoundingClientRect();
  return {
    x: r.left + r.width / 2 - playRect.left,
    y: r.top + r.height / 2 - playRect.top
  };
}

function drawMatchLines(){
  const svg = document.getElementById("matchLines");
  const play = document.querySelector(".matchPlay");
  if(!svg || !play || state.tab !== "silang") return;

  const quiz = currentMatch();
  const map = matchMapFor(quiz.id);
  const playRect = play.getBoundingClientRect();

  if(playRect.width <= 0 || playRect.height <= 0) return;

  svg.setAttribute("viewBox", `0 0 ${playRect.width} ${playRect.height}`);
  svg.setAttribute("width", String(playRect.width));
  svg.setAttribute("height", String(playRect.height));

  const paths = Object.entries(map).map(([leftIndexRaw, answer]) => {
    const leftIndex = Number(leftIndexRaw);
    const rightIndex = quiz.right.indexOf(answer);
    if(rightIndex < 0) return "";

    const leftDot = play.querySelector(`.matchItem[data-left-index="${leftIndex}"] .matchDot`);
    const rightDot = play.querySelector(`.matchItem[data-right-index="${rightIndex}"] .matchDot`);
    if(!leftDot || !rightDot) return "";

    const p1 = dotCenterRelativeToPlay(leftDot, playRect);
    const p2 = dotCenterRelativeToPlay(rightDot, playRect);
    const wrong = state.matchChecked && quiz.pairs[leftIndex].match !== answer;
    const color = matchColors[leftIndex % matchColors.length];
    const distance = Math.abs(p2.x - p1.x);
    const control = Math.max(55, distance * 0.38);
    const d = `M ${p1.x} ${p1.y} C ${p1.x + control} ${p1.y}, ${p2.x - control} ${p2.y}, ${p2.x} ${p2.y}`;

    return `<path class="${wrong ? "wrong" : ""}" d="${d}" stroke="${color}" />`;
  }).join("");

  svg.innerHTML = paths;
}

function answerByChoiceIndex(id,choiceIndex){
  const question = questions.find(item => item.id===id);

  if(!question || !question.c[choiceIndex]){
    return;
  }

  answer(id,question.c[choiceIndex]);
}

function answer(id,choice){
  if(state.checked){
    return;
  }

  cancelAutoAdvance();

  const answeredIndex = state.index;
  const answeredTopic = state.filter;
  const question = questions.find(item => item.id === id);

  if(!question){
    return;
  }

  awardXP({
    key:`latihan:v2:${question.t}:${id}`,
    correct:choice === question.a,
    label:`Latihan ${question.t}`
  });

  state.answers[id] = choice;
  render();

  autoAdvanceTimer = setTimeout(()=>{
    autoAdvanceTimer = null;

    if(
      state.tab !== "latihan"
      || state.checked
      || state.filter !== answeredTopic
      || state.index !== answeredIndex
    ){
      return;
    }

    const total = visibleQuestions().length;

    if(state.index < total-1){
      state.index += 1;
      render();
    }
  },320);
}

function resetCurrentTopic(){
  cancelAutoAdvance();

  visibleQuestions().forEach(question => {
    delete state.answers[question.id];
  });

  state.checked = false;
  state.index = 0;
  render();
}

function resetAnswers(){
  resetCurrentTopic();
}

function shuffleQuestions(){
  state.index = 0;
  render();
}

function checkAnswers(){
  cancelAutoAdvance();
  const result = stats();

  if(!result.answered){
    alert("Jawablah sekurang-kurangnya satu soal terlebih dahulu.");
    return;
  }

  if(
    result.answered < result.total
    && !confirm(
      `Masih ada ${result.remaining} soal yang belum dijawab. Apakah jawaban tetap ingin diperiksa?`
    )
  ){
    return;
  }

  state.checked = true;
  const finalResult = stats();

  state.history.unshift({
    at:Date.now(),
    score:finalResult.score,
    correct:finalResult.correct,
    total:finalResult.total,
    topic:state.filter
  });

  state.history = state.history.slice(0,10);
  localStorage.setItem(STORE,JSON.stringify(state.history));
  render();

  submitStudentResult("Pilihan ganda",{
    topic:state.filter,
    score:finalResult.score,
    correct:finalResult.correct,
    total:finalResult.total,
    answers:visibleQuestions().map((question,index)=>({
      number:index + 1,
      question:question.q,
      selected:state.answers[question.id] || "",
      correctAnswer:question.a,
      isCorrect:state.answers[question.id] === question.a
    }))
  });
}

function setMatch(i){
  const nextIndex = Math.max(0, Math.min(Number(i), crossQuizzes.length - 1));
  state.matchIndex = nextIndex;
  state.matchSelectedLeft = null;
  state.matchSelectedRight = null;
  state.matchChecked = false;
  state.matchLastXP = null;
  render();
}

function prevMatch(){
  if(state.matchIndex <= 0) return;
  setMatch(state.matchIndex - 1);
}

function nextMatch(){
  if(state.matchIndex >= crossQuizzes.length - 1) return;
  setMatch(state.matchIndex + 1);
}
function randomMatch(){
  state.matchIndex = Math.floor(Math.random() * crossQuizzes.length);
  state.matchSelectedLeft = null;
  state.matchSelectedRight = null;
  state.matchChecked = false;
  state.matchLastXP = null;
  render();
}
function connectMatch(leftIndex, rightIndex, direction){
  const quiz = currentMatch();
  const answer = quiz.right[rightIndex];
  const map = matchMapFor(quiz.id);
  const dirMap = matchDirMapFor(quiz.id);

  Object.keys(map).forEach(k => {
    if(map[k] === answer && Number(k) !== leftIndex) {
      delete map[k];
      delete dirMap[k];
    }
  });

  map[leftIndex] = answer;
  dirMap[leftIndex] = direction;

  state.matchSelectedLeft = null;
  state.matchSelectedRight = null;
  render();
}

function chooseLeft(i){
  if(state.matchChecked) return;

  if(state.matchSelectedRight !== null){
    connectMatch(i, state.matchSelectedRight, "rtl");
    return;
  }

  state.matchSelectedLeft = state.matchSelectedLeft === i ? null : i;
  state.matchSelectedRight = null;
  render();
}

function chooseRightByIndex(rightIndex){
  if(state.matchChecked) return;

  if(state.matchSelectedLeft !== null){
    connectMatch(state.matchSelectedLeft, rightIndex, "ltr");
    return;
  }

  state.matchSelectedRight = state.matchSelectedRight === rightIndex ? null : rightIndex;
  state.matchSelectedLeft = null;
  render();
}

function chooseRight(answer){
  const quiz = currentMatch();
  const rightIndex = quiz.right.indexOf(answer);
  if(rightIndex >= 0) chooseRightByIndex(rightIndex);
}

function resetMatch(){
  const quiz = currentMatch();
  state.matchAnswers[quiz.id] = {};
  state.matchDirections[quiz.id] = {};
  state.matchSelectedLeft = null;
  state.matchSelectedRight = null;
  state.matchChecked = false;
  state.matchLastXP = null;
  render();
}
function checkMatch(){
  if(state.matchChecked){
    return;
  }

  const quiz = currentMatch();
  const map = matchMapFor(quiz.id);
  const calculation = matchXPEntries(quiz,map);
  const xpResult = awardFixedXP(calculation.entries);

  state.matchLastXP = {
    quizId:quiz.id,
    amount:xpResult.amount,
    answered:calculation.answered,
    correct:calculation.correct,
    total:calculation.total,
    allCorrect:calculation.allCorrect
  };

  state.matchSelectedLeft = null;
  state.matchSelectedRight = null;
  state.matchChecked = true;
  render();

  const finalResult = matchStats();
  submitStudentResult("Cocokkan kata",{
    topic:quiz.title,
    score:finalResult.score,
    correct:finalResult.correct,
    total:finalResult.total,
    answers:quiz.pairs.map((pair,index)=>({
      number:index + 1,
      question:pair.term,
      selected:map[index] || "",
      correctAnswer:pair.match,
      isCorrect:map[index] === pair.match
    }))
  });
}

window.addEventListener("resize", () => {
  if(state.tab === "silang") requestAnimationFrame(drawMatchLines);
});

/* Menyamakan kontribusi XP Uraian lama dengan hasil penilaian terbaru. */
syncEssayXP();
render();
ensureStudentLogin();
</script>
